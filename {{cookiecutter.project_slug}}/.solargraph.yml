---
include:
  # process first
  - "Gemfile"
  - "*.gemspec"
  - "Rakefile"
  - "rakelib/*.rake"
  - "config/annotations*.rb"
  - "**/*.rb"
  - "**/.*.rb"
  - "lib/tasks/*.rake"
  - ".git-hooks/**/*.rb"
  - "script/*"
  - "bin/ensure_dev_library"
  - "bin/ensure_package"
  - "bin/git-commit-validate"
  - "bin/git-push-validate"
  - "bin/install_package"
  - "bin/srb-overcommit"
  - "bin/overcommit_branch"
exclude:
  # vendored
  - 'bin/bundle'
  - 'bin/setup'
  - 'bin/brakeman'
  - 'bin/docker-entrypoint'
  # Bundler binstubs and Rails boot use ENV[], which Solargraph 0.59+
  # does not yet resolve against RBS::Unnamed::ENVClass.
  - 'config/boot.rb'
  - 'config/initializers/checkoff.rb'
  - 'spec/**/*'
  - "db/migrate/**/*"
  - db/schema.rb
  - 'config/puma.rb'
  - 'config/routes.rb'
  - 'config/importmap.rb'
  # I don't know why this fails
  # https://app.circleci.com/pipelines/github/apiology/cookiecutter-rails/178/workflows/20d4f825-50a3-4dc1-8b6d-9a155fc892cc/jobs/375
  - 'config/environments/**.rb'
  - script/.rubocop.yml
  - vendor/**/*
  - ".bundle/**/*"
  - ".markdownlint_style.rb"
require:
  - actioncable
  - actionmailer
  - actionpack
  - actionview
  - activejob
  - activemodel
  - activerecord
  - activestorage
  - activesupport
domains: []
reporters:
  - rubocop
  - require_not_found
  - typecheck:strong
  - update_errors
formatter:
  rubocop:
    cops: safe
    except: []
    only: []
    extra_args: []
require_paths: []
plugins:
  - solargraph-rails
max_files: 5000
