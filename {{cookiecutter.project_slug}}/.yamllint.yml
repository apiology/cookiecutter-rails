---
# https://yamllint.readthedocs.io/en/stable/configuration.html
extends: default

rules:
  comments: disable
  line-length:
    max: 120
    ignore: |
      # long shell literal strings
      **/.circleci/config.yml
  # Rails ships with some things
  indentation:
    ignore:
      - '**/.github/dependabot.yml'
  brackets:
    ignore:
      - '**/.github/workflows/ci.yml'
  document-start:
    ignore:
      - '**/.github/workflows/ci.yml'
      - '**/.github/dependabot.yml'
      - '**/config/**/*.yml'
  truthy:
    ignore:
      - '**/.github/workflows/ci.yml'
  empty-lines:
    ignore:
      - '**/.github/workflows/ci.yml'
